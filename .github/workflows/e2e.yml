name: HSC E2E Tests

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: [main]
  pull_request:
    branches: [main]

  workflow_dispatch:
    inputs:
      environment:
        description: 'Choose test environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - qa

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: yarn install

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run E2E tests
        env:
          TEST_ENVIRONMENT: '${{ github.event.inputs.environment }}'
          O3_URL_DEV: '${{ vars.O3_URL_DEV }}'
          ODOO_URL_DEV: '${{ vars.ODOO_URL_DEV }}'
          O3_USERNAME: '${{ secrets.O3_USERNAME }}'
          O3_PASSWORD: '${{ secrets.O3_PASSWORD }}'
          ODOO_USERNAME: '${{ secrets.ODOO_USERNAME }}'
          ODOO_PASSWORD: '${{ secrets.ODOO_PASSWORD }}'
        run: npm run hsc-e2e

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
